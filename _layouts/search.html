<!doctype html>
<html lang="{{ site.lang | default: 'vi' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>
  <body class="page page-search">
    {% include header.html %}
    <main class="l-page">
      <div class="l-container l-container--with-sidebar">
        <div class="l-content">
          <section class="content-block content-block--search">
            <header class="content-block__header">
              <h1 class="content-block__title">{{ page.title }}</h1>
              <p class="content-block__meta">Placeholder cho search page.</p>
            </header>
            {% include template-parts/content-none.html %}
          </section>
        </div>
        <aside class="l-sidebar">
          {% include sidebar.html %}
        </aside>
      </div>
    </main>
    {% include footer.html %}
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
