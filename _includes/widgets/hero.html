{% assign home = site.data.pages.home %}
<section class="hero">
  <div class="hero__content">
    <p class="hero__eyebrow">{{ home.hero.eyebrow }}</p>
    <h1 class="hero__title">{{ home.hero.title }}</h1>
    <p class="hero__summary">{{ home.hero.summary }}</p>
    <div class="hero__actions">
      <a class="button button--primary" href="{{ home.hero.primary.url | relative_url }}">{{ home.hero.primary.label }}</a>
      <a class="button button--secondary" href="{{ home.hero.secondary.url | relative_url }}">{{ home.hero.secondary.label }}</a>
    </div>
  </div>
</section>
