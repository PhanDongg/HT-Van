<header class="site-header">
  <div class="site-header__inner l-container">
    <a class="site-header__brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav" aria-label="Main navigation">
      {% for item in site.data.menus.primary %}
        <a class="site-nav__link" href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>
    <a class="button button--primary" href="{{ '/auth/login/' | relative_url }}">Dang nhap</a>
  </div>
</header>
